version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region ap-south-2 | docker login --username AWS --password-stdin 989735870396.dkr.ecr.ap-south-2.amazonaws.com
      - REPOSITORY_URI=989735870396.dkr.ecr.ap-south-2.amazonaws.com/docker-app
      - IMAGE_TAG=latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG

  build:
    commands:
      - echo Building Docker image...
      - docker build -t $REPOSITORY_URI:$IMAGE_TAG .

  post_build:
    commands:
      - echo Build completed successfully